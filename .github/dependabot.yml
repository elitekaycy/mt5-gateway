version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule: {interval: weekly}
    groups:
      python-minor-patch: {update-types: [minor, patch]}
  - package-ecosystem: pip
    directory: /app
    schedule: {interval: weekly}
    groups:
      runtime-minor-patch: {update-types: [minor, patch]}
  - package-ecosystem: github-actions
    directory: /
    schedule: {interval: weekly}
  - package-ecosystem: docker
    directory: /
    schedule: {interval: weekly}
