name: docker

# Build the gateway image and push it to Docker Hub (elitekaycy/mt5-gateway-api).
# Replaces the previous manual `docker build` + `docker push`. Fires when main
# advances (the promote-to-main flow) and on version tags, plus manual dispatch.
#
# Tags published: `latest` (main only), the VERSION file value, the git tag (on
# v* tag pushes), and a `sha-<commit>` tag for precise pinning.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Free disk space for the Wine image build
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force

      - name: Read version
        id: ver
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches VERSION
        if: startsWith(github.ref, 'refs/tags/v')
        run: test "${GITHUB_REF_NAME#v}" = "$(cat VERSION)"

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: elitekaycy/mt5-gateway-api
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.ver.outputs.version }}
            type=ref,event=tag
            type=sha

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true

      - name: Scan published image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: elitekaycy/mt5-gateway-api:${{ steps.ver.outputs.version }}
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1
