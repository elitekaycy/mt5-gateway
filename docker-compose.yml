services:
  mt5:
    build:
      dockerfile: Dockerfile
    container_name: mt5-gateway
    volumes:
      - ./config:/config
    networks:
      - default
    env_file:
      - .env
    environment:
      # Headless env login (optional). Empty -> manual VNC flow + persisted volume.
      # MT5_SERVER is the broker server NAME (e.g. Exness-MT5Trial9); the gateway
      # resolves it to a connectable access-point address, so no broker directory
      # or IP knowledge is needed. Set MT5_SERVER_ADDR to a host:port to skip
      # resolution, or MT5_AUTORESOLVE=0 to force name-only login.
      #
      # Resolution is a self-aware cascade tried in order: the baked broker table
      # (offline, in the image) -> the MT5_RESOLVER_URL services -> the name itself.
      # The image runs as a single container out of the box (baked table + the
      # public mt5.mtapi.io). To resolve unbaked brokers with zero third-party, start
      # the bundled self-hosted resolver with `--profile self-hosted-resolver` and,
      # to prefer it, set MT5_RESOLVER_URL=http://mt5-resolver:80,https://mt5.mtapi.io.
      MT5_LOGIN: ${MT5_LOGIN:-}
      MT5_PASSWORD: ${MT5_PASSWORD:-}
      MT5_SERVER: ${MT5_SERVER:-}
      MT5_SERVER_ADDR: ${MT5_SERVER_ADDR:-}
      MT5_RESOLVER_URL: ${MT5_RESOLVER_URL:-https://mt5.mtapi.io,http://mt5-resolver:80}
      MT5_ENABLE_ALGO_TRADING: ${MT5_ENABLE_ALGO_TRADING:-1}
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
      - "127.0.0.1:5001:5001"

    healthcheck:
      test:
        [
          "CMD-SHELL",
          'if [ -n "$$API_KEY" ]; then curl -fsS -H "Authorization: Bearer $$API_KEY" http://localhost:5001/health/ready; else curl -fsS http://localhost:5001/health/ready; fi',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G

  # Optional self-hosted broker-directory search (opt-in): maps a broker server
  # NAME to its access-point host:port list, mirroring MetaQuotes' directory, so
  # resolution runs entirely in your infra with no third-party call. Off by
  # default (the baked table covers common brokers; mtapi.io covers the rest).
  # Start it with `docker compose --profile self-hosted-resolver up`; it is the
  # deeper fallback in the default MT5_RESOLVER_URL. To make it the ONLY resolver
  # (no third-party), set MT5_RESOLVER_URL=http://mt5-resolver:80.
  mt5-resolver:
    image: elitekaycy/mt5-rest:latest
    container_name: mt5-resolver
    restart: unless-stopped
    profiles: ["self-hosted-resolver"]
    networks:
      - default

networks:
  default:
    driver: bridge
