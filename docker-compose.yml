services:
  mt5:
    build:
      dockerfile: Dockerfile
    container_name: mt5-gateway
    volumes:
      - ./config:/config
    networks:
      - default
    env_file:
      - .env
    environment:
      # Headless env login (optional). Empty -> manual VNC flow + persisted volume.
      MT5_LOGIN: ${MT5_LOGIN:-}
      MT5_PASSWORD: ${MT5_PASSWORD:-}
      MT5_SERVER: ${MT5_SERVER:-}
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
      - "127.0.0.1:5001:5001"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G

networks:
  default:
    driver: bridge
